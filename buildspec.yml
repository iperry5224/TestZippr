version: 0.2

env:
  variables:
    S3_BUCKET: "saelarallpurpose"
    S3_PREFIX: "deployments"

phases:
  install:
    runtime-versions:
      python: 3.12
  pre_build:
    commands:
      - echo "Packaging GRCP tools for deployment..."
      - echo "Build started on $(date)"
  build:
    commands:
      - echo "Creating deployment artifact..."
      - zip -r grcp-latest.zip . -x '.git/*' '__pycache__/*' '*.pyc' '.env*' '*.pem' '*.key' 'venv/*' '.venv/*'
  post_build:
    commands:
      - echo "Uploading to S3..."
      - aws s3 cp grcp-latest.zip s3://${S3_BUCKET}/${S3_PREFIX}/grcp-latest.zip
      - echo "Deploy artifact uploaded to s3://${S3_BUCKET}/${S3_PREFIX}/grcp-latest.zip"
      - echo "The EC2 deploy agent will pick this up within 60 seconds."

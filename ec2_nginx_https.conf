# nginx: splash page (port 80) + HTTPS for SAELAR/SOPRA
# http://EC2_IP → splash with links
# https://EC2_IP:8443 (SAELAR), https://EC2_IP:8444 (SOPRA)

server {
    listen 80 default_server;
    server_name _;
    root /opt/apps/splash;
    index index.html;
    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 8443 ssl;
    server_name _;
    ssl_certificate /opt/apps/ssl_certs/streamlit.crt;
    ssl_certificate_key /opt/apps/ssl_certs/streamlit.key;
    location / {
        proxy_pass http://127.0.0.1:8484;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 8444 ssl;
    server_name _;
    ssl_certificate /opt/apps/ssl_certs/streamlit.crt;
    ssl_certificate_key /opt/apps/ssl_certs/streamlit.key;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
